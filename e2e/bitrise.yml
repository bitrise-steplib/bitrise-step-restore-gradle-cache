format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  test_gradle:
    envs:
    - TEST_APP_URL: https://github.com/bitrise-io/Bitrise-Android-Sample
    - BRANCH: main
    before_run:
    - _setup
    steps:
    - change-workdir:
        title: Switch working dir to _tmp
        inputs:
        - path: ./_tmp
    - script:
        title: Clean Gradle caches
        inputs:
        - content: |-
            set -ex
            rm -rf ~/.gradle
            rm -rf ./_tmp/.gradle
    - android-build:
        inputs:
        - module: app
        - variant: debug
    - save-cache:
        run_if: "true"
        is_skippable: false
        inputs:
        - key: |-
            {{ .OS }}-{{ .Arch }}-gradle-cache-{{ checksum "**/*.gradle*" "**/gradle-wrapper.properties" "gradle.properties" "gradle/libs.versions.toml" }}
        - paths: |-
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle/configuration-cache
        - verbose: "true"
    - script:
        title: Clean Gradle caches
        inputs:
        - content: |-
              set -ex
              rm -rf ~/.gradle
              rm -rf ./_tmp/.gradle
    - path::./:
        title: Execute step
        run_if: "true"
        is_skippable: false
        inputs:
        - verbose: "true"
    - android-build:
        title: Build app again
        inputs:
        - module: app
        - variant: debug

  _setup:
    steps:
    - script:
        title: Delete _tmp dir
        inputs:
        - content: rm -rf _tmp
    - git::https://github.com/bitrise-steplib/bitrise-step-simple-git-clone.git:
        inputs:
        - repository_url: $TEST_APP_URL
        - clone_into_dir: ./_tmp
        - branch: $BRANCH
